<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026世界杯 AI预测中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:#0a0e1a;color:#e0e0e0;min-height:100vh;padding-bottom:70px}
.header{background:linear-gradient(135deg,#1a1f35,#0d1225);padding:16px 20px;text-align:center;border-bottom:2px solid #2a3050;position:sticky;top:0;z-index:100}
.header h1{font-size:22px;background:linear-gradient(90deg,#ffd700,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-top:6px;gap:8px}
.coin-box{display:flex;align-items:center;gap:4px;background:#1a2240;padding:4px 12px;border-radius:16px;font-size:13px;font-weight:700;color:#ffd700}
.user-box{display:flex;align-items:center;gap:6px;background:#1a2240;padding:4px 12px;border-radius:16px;font-size:13px;cursor:pointer}
.user-box .avatar{font-size:16px}
.update-time{color:#4a9eff;font-size:10px}
.container{max-width:900px;margin:0 auto;padding:12px}
.tabs{display:flex;background:#141929;border-radius:10px;padding:3px;margin-bottom:14px;position:sticky;top:80px;z-index:99}
.tab{flex:1;text-align:center;padding:8px 0;border-radius:8px;cursor:pointer;font-size:12px;color:#5a6580;transition:.2s}
.tab.active{background:#1a2a4a;color:#ffd700;font-weight:600}
.section{font-size:16px;font-weight:700;margin:16px 0 8px;padding-left:10px;border-left:3px solid #ffd700}
.card{background:#141929;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #1e2640}
.card.upset{border-color:#ff6b6b}
.match{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.team{display:flex;align-items:center;gap:6px;flex:1;min-width:80px}
.team.away{flex-direction:row-reverse;text-align:right}
.flag{font-size:20px}.tname{font-size:13px;font-weight:600}
.score{font-size:22px;font-weight:800;min-width:55px;text-align:center;color:#fff}
.score.pred{color:#ffd700;font-size:16px}
.info{display:flex;justify-content:space-between;align-items:center;margin-top:4px;font-size:10px;color:#5a6580;flex-wrap:wrap;gap:3px}
.tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:5px}
.tag-f{background:#1a2240;color:#5a6580}.tag-p{background:#1a2a4a;color:#4a9eff}.tag-u{background:#3a1a2a;color:#ff6b6b}
.conf{font-size:9px;padding:1px 6px;border-radius:5px}
.conf-h{background:#1b3a2a;color:#4caf50}.conf-m{background:#3a3520;color:#ffc107}.conf-l{background:#3a2a1a;color:#ff9800}
.reason{font-size:11px;color:#8892b0;margin-top:4px;line-height:1.3}
.bet-area{margin-top:8px;padding-top:8px;border-top:1px solid #1e2640}
.bet-buttons{display:flex;gap:5px;flex-wrap:wrap}
.bet-btn{flex:1;padding:7px 4px;border:2px solid #2a3560;background:#0d1225;color:#8892b0;border-radius:7px;cursor:pointer;font-size:11px;text-align:center;transition:.2s;min-width:60px}
.bet-btn:hover{border-color:#4a9eff;color:#4a9eff}
.bet-btn.selected{border-color:#ffd700;color:#ffd700;background:#1a1f00}
.bet-input{display:flex;align-items:center;gap:5px;margin-top:6px;flex-wrap:wrap}
.bet-input label{font-size:11px;color:#5a6580}
.bet-input input{width:70px;padding:5px 6px;background:#0d1225;border:1px solid #2a3560;color:#ffd700;border-radius:5px;font-size:12px;text-align:center}
.bet-input .odds{font-size:11px;color:#4a9eff}
.bet-confirm{margin-top:6px;padding:7px;background:linear-gradient(135deg,#ffd700,#ff6b35);color:#0a0e1a;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;width:100%}
.bet-confirm:disabled{background:#2a3050;color:#5a6580;cursor:not-allowed}
.my-bet{margin-top:6px;padding:6px;background:#0d1225;border-radius:6px;font-size:11px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.my-bet-choice{color:#ffd700;font-weight:600}
.bet-tag{font-size:9px;padding:1px 5px;border-radius:3px}
.bet-tag-won{background:#1b3a2a;color:#4caf50}.bet-tag-lost{background:#3a1a1a;color:#f44336}.bet-tag-pending{background:#3a3520;color:#ffc107}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0e1a;border-top:1px solid #1e2640;display:flex;z-index:100}
.nav-item{flex:1;text-align:center;padding:8px 0;font-size:11px;color:#5a6580;cursor:pointer}
.nav-item.active{color:#ffd700}
.nav-item .icon{font-size:16px;display:block}
.group-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.gtab{padding:4px 10px;background:#141929;border-radius:14px;font-size:11px;cursor:pointer;color:#5a6580;border:1px solid #1e2640}
.gtab.active{background:#1a2a4a;color:#ffd700;border-color:#ffd700}
table{width:100%;border-collapse:collapse;font-size:11px}
th{color:#5a6580;font-weight:600;padding:4px 2px;text-align:center;border-bottom:1px solid #1e2640}
td{padding:5px 2px;text-align:center;border-bottom:1px solid #1a2040}
td.tc{text-align:left}.pts{font-weight:700;color:#4a9eff}
.gp{color:#4caf50}.gn{color:#f44336}
.champ{text-align:center;padding:16px}
.champ-flag{font-size:40px}.champ-name{font-size:24px;font-weight:800;color:#fff}
.champ-sub{color:#8892b0;font-size:12px;margin-top:6px;line-height:1.5}
.gold{background:linear-gradient(135deg,#2a1f00,#1a1500);border:2px solid #ffd700;border-radius:14px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.stat-box{background:#141929;border-radius:8px;padding:10px;text-align:center;border:1px solid #1e2640}
.stat-num{font-size:18px;font-weight:800;color:#ffd700}
.stat-label{font-size:10px;color:#5a6580;margin-top:1px}
.empty{text-align:center;padding:40px;color:#5a6580;font-size:12px}
.hidden{display:none}

/* 登录弹窗 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#141929;border-radius:16px;padding:24px;width:90%;max-width:360px;border:1px solid #2a3050;text-align:center}
.modal h2{font-size:20px;color:#ffd700;margin-bottom:16px}
.modal input{width:100%;padding:10px;background:#0d1225;border:1px solid #2a3560;color:#ffd700;border-radius:8px;font-size:14px;text-align:center;margin-bottom:12px}
.modal .submit{padding:10px;background:linear-gradient(135deg,#ffd700,#ff6b35);color:#0a0e1a;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;width:100%}
.modal .skip{margin-top:8px;font-size:12px;color:#5a6580;cursor:pointer}
.avatar-select{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:12px}
.avatar-opt{font-size:24px;cursor:pointer;padding:4px;border-radius:8px;border:2px solid transparent;transition:.2s}
.avatar-opt.selected{border-color:#ffd700;background:#1a1f00}

/* 排行榜 */
.lb-tabs{display:flex;gap:4px;margin-bottom:10px}
.lb-tab{flex:1;text-align:center;padding:6px;border-radius:6px;font-size:11px;cursor:pointer;color:#5a6580;background:#141929}
.lb-tab.active{background:#1a2a4a;color:#ffd700}
.lb-row{display:flex;align-items:center;padding:8px;border-bottom:1px solid #1a2040;gap:8px}
.lb-rank{width:24px;text-align:center;font-weight:700;font-size:14px}
.lb-rank.top1{color:#ffd700}.lb-rank.top2{color:#c0c0c0}.lb-rank.top3{color:#cd7f32}
.lb-avatar{font-size:18px}.lb-name{flex:1;font-size:13px}
.lb-value{font-size:13px;font-weight:700;text-align:right;min-width:60px}
.lb-value.coins{color:#ffd700}.lb-value.wr{color:#4caf50}.lb-value.profit-pos{color:#4caf50}.lb-value.profit-neg{color:#f44336}
</style>
</head>
<body>

<div class="header">
  <h1>2026世界杯 AI预测中心</h1>
  <div class="top-bar">
    <div class="user-box" id="userBox" onclick="showProfile()"><span class="avatar" id="userAvatar">👤</span><span id="userName">点击登录</span></div>
    <div class="coin-box">🪙 <span id="coinDisplay">-</span></div>
    <div class="update-time" id="updateTime">-</div>
  </div>
</div>

<div class="container">
  <div class="tabs" id="mainTabs">
    <div class="tab active" onclick="switchTab('today')">今日赛事</div>
    <div class="tab" onclick="switchTab('upcoming')">即将开赛</div>
    <div class="tab" onclick="switchTab('standings')">积分榜</div>
    <div class="tab" onclick="switchTab('champion')">冠军预测</div>
  </div>
  <div id="content"><div style="text-align:center;padding:40px"><div style="display:inline-block;width:24px;height:24px;border:3px solid #1e2640;border-top:3px solid #ffd700;border-radius:50%;animation:spin 1s linear infinite"></div></div></div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="pageNav('main')"><span class="icon">⚽</span>赛事</div>
  <div class="nav-item" onclick="pageNav('mybets')"><span class="icon">🎯</span>竞猜</div>
  <div class="nav-item" onclick="pageNav('friends')"><span class="icon">👥</span>好友</div>
  <div class="nav-item" onclick="pageNav('leaderboard')"><span class="icon">🏆</span>排行</div>
  <div class="nav-item" onclick="pageNav('history')"><span class="icon">📊</span>战绩</div>
</div>

<div id="profileModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2>个人资料</h2>
    <div style="text-align:center;margin-bottom:12px">
      <span id="profileAvatar" style="font-size:40px">😎</span>
      <div id="profileName" style="font-size:16px;font-weight:700;color:#fff;margin-top:4px">-</div>
      <div id="profileCoins" style="font-size:13px;color:#ffd700">🪙 - 金币</div>
    </div>
    <div style="text-align:left;margin-bottom:12px">
      <div style="font-size:12px;color:#5a6580;margin-bottom:4px">微信号</div>
      <div id="wechatBindArea"></div>
    </div>
    <button onclick="closeProfile()" style="padding:10px;background:#1e2640;color:#8892b0;border:none;border-radius:8px;cursor:pointer;font-size:13px;width:100%">关闭</button>
  </div>
</div>

<div id="loginModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2>欢迎来到世界杯预测</h2>
    <div class="avatar-select">
      <span class="avatar-opt selected" onclick="pickAvatar(this,'😎')">😎</span>
      <span class="avatar-opt" onclick="pickAvatar(this,'🦁')">🦁</span>
      <span class="avatar-opt" onclick="pickAvatar(this,'⚽')">⚽</span>
      <span class="avatar-opt" onclick="pickAvatar(this,'🏆')">🏆</span>
      <span class="avatar-opt" onclick="pickAvatar(this,'🎯')">🎯</span>
      <span class="avatar-opt" onclick="pickAvatar(this,'🔥')">🔥</span>
      <span class="avatar-opt" onclick="pickAvatar(this,'👑')">👑</span>
      <span class="avatar-opt" onclick="pickAvatar(this,'🎮')">🎮</span>
    </div>
    <input type="text" id="nicknameInput" placeholder="输入你的昵称" maxlength="12">
    <input type="text" id="wechatInputLogin" placeholder="输入你的微信号（必填）" maxlength="20" style="width:100%;padding:10px;background:#0d1225;border:1px solid #2a3560;color:#ffd700;border-radius:8px;font-size:14px;text-align:center;margin-bottom:12px">
    <button class="submit" onclick="doLogin()">进入游戏</button>
    <div class="skip" onclick="doGuestLogin()">先看看再说</div>
  </div>
</div>

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script>
var API = '';
var allMatches = [], allStandings = {};
var currentPage = 'main', currentTab = 'today';
var currentUser = null;
var selectedBet = {}, betAmounts = {};
var selectedAvatar = '😎';
var lbTab = 'coins';

// ===== 用户系统 =====
function getUser() { try { return JSON.parse(localStorage.getItem('wc_user')); } catch(e) { return null; } }
function saveUser(u) { localStorage.setItem('wc_user', JSON.stringify(u)); currentUser = u; updateUserUI(); }
function updateUserUI() {
  if (currentUser) {
    document.getElementById('userAvatar').textContent = currentUser.avatar || '😎';
    document.getElementById('userName').textContent = currentUser.nickname + (currentUser.wechatId ? ' 📱' : '');
    document.getElementById('coinDisplay').textContent = currentUser.coins;
  }
}

function showLogin() { document.getElementById('loginModal').style.display='flex'; }
function showProfile() {
  if (!currentUser) { showLogin(); return; }
  document.getElementById('profileAvatar').textContent = currentUser.avatar || '😎';
  document.getElementById('profileName').textContent = currentUser.nickname;
  document.getElementById('profileCoins').textContent = '🪙 ' + currentUser.coins + ' 金币';
  document.getElementById('wechatInput').value = currentUser.wechatId || '';
  document.getElementById('wechatStatus').textContent = currentUser.wechatId ? '已绑定: ' + currentUser.wechatId : '未绑定';
  document.getElementById('wechatStatus').style.color = currentUser.wechatId ? '#4caf50' : '#5a6580';
  document.getElementById('profileModal').style.display = 'flex';
}
function closeProfile() { document.getElementById('profileModal').style.display = 'none'; }
function saveWechat() {
  var wid = document.getElementById('wechatInput').value.trim();
  if (!wid) { alert('请输入微信号'); return; }
  fetch(API + '/api/user/' + currentUser.uid + '/wechat', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ wechatId: wid })
  }).then(function(r){return r.json()}).then(function(d) {
    if (d.error) { alert(d.error); return; }
    currentUser.wechatId = wid;
    saveUser(currentUser);
    document.getElementById('wechatStatus').textContent = '已绑定: ' + wid;
    document.getElementById('wechatStatus').style.color = '#4caf50';
    alert('微信号绑定成功！');
  }).catch(function(){ alert('保存失败'); });
}
function closeLogin() { document.getElementById('loginModal').style.display='none'; }
function pickAvatar(el, av) {
  document.querySelectorAll('.avatar-opt').forEach(function(e){e.classList.remove('selected')});
  el.classList.add('selected');
  selectedAvatar = av;
}

async function doLogin() {
  var nick = document.getElementById('nicknameInput').value.trim();
  if (!nick) { alert('请输入昵称'); return; }
  try {
    var res = await fetch(API + '/api/user/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ nickname: nick, avatar: selectedAvatar })
    });
    var data = await res.json();
    if (data.user) {
      saveUser(data.user);
      closeLogin();
      loadBets();
    }
  } catch(e) { alert('登录失败，请重试'); }
}

// ===== 下注 =====
async function confirmBet(matchId) {
  if (!currentUser) { showLogin(); return; }
  var choice = selectedBet[matchId];
  var amount = betAmounts[matchId] || 100;
  if (!choice) { alert('请选择竞猜结果'); return; }

  try {
    var res = await fetch(API + '/api/bet', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ uid: currentUser.uid, matchId: matchId, choice: choice, amount: amount })
    });
    var data = await res.json();
    if (data.error) { alert(data.error); return; }
    currentUser.coins = data.coins;
    saveUser(currentUser);
    delete selectedBet[matchId];
    delete betAmounts[matchId];
    render();
    loadBets();
  } catch(e) { alert('下注失败'); }
}

var myBets = [];
async function loadBets() {
  if (!currentUser) return;
  try {
    var res = await fetch(API + '/api/bets/' + currentUser.uid);
    var data = await res.json();
    myBets = data.bets || [];
    // 结算
    await fetch(API + '/api/settle', { method: 'POST' });
    // 刷新用户
    var ures = await fetch(API + '/api/user/' + currentUser.uid);
    var udata = await ures.json();
    if (udata.user) { saveUser(udata.user); }
  } catch(e) {}
}

// ===== 数据加载 =====
async function loadData() {
  try {
    var [mr, sr] = await Promise.all([fetch(API+'/api/matches'), fetch(API+'/api/standings')]);
    allMatches = (await mr.json()).matches || [];
    allStandings = (await sr.json()).groups || {};
  } catch(e) { console.error(e); }
  render();
  document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN',{hour:'2-digit',minute:'2-digit'});
}

// ===== 球队数据 =====
var R={'阿根廷':94,'法国':93,'英格兰':91,'巴西':90,'德国':89,'西班牙':89,'荷兰':87,'葡萄牙':87,'比利时':85,'克罗地亚':84,'哥伦比亚':83,'乌拉圭':82,'日本':80,'美国':79,'墨西哥':78,'韩国':77,'澳大利亚':76,'瑞士':76,'塞内加尔':75,'摩洛哥':75,'挪威':74,'瑞典':74,'埃及':73,'科特迪瓦':73,'厄瓜多尔':72,'土耳其':72,'巴拉圭':71,'苏格兰':70,'卡塔尔':69,'加拿大':68,'伊朗':67,'沙特阿拉伯':66,'突尼斯':65,'捷克':65,'波黑':64,'奥地利':64,'加纳':63,'新西兰':62,'巴拿马':61,'海地':58,'阿尔及利亚':62,'约旦':59,'伊拉克':58,'南非':57,'佛得角':55,'库拉索':50,'乌兹别克斯坦':56};
var HB={'美国':8,'墨西哥':8,'加拿大':6};
var SP={'法国vs塞内加尔':{h:2,a:0,c:85,r:'法国阵容豪华，姆巴佩领衔'},'伊拉克vs挪威':{h:1,a:2,c:65,r:'哈兰德坐镇挪威锋线'},'奥地利vs约旦':{h:2,a:1,c:70,r:'欧洲劲旅经验取胜'},'阿根廷vs阿尔及利亚':{h:3,a:0,c:90,r:'卫冕冠军首战，梅西最后一舞'},'英格兰vs克罗地亚':{h:2,a:1,c:65,r:'英格兰青春风暴对决克罗地亚'},'德国vs科特迪瓦':{h:3,a:1,c:75,r:'德国首轮7-1后士气高涨'},'美国vs澳大利亚':{h:2,a:1,c:70,r:'东道主状态火热'},'西班牙vs沙特阿拉伯':{h:2,a:0,c:75,r:'西班牙必全力争胜'},'比利时vs伊朗':{h:2,a:0,c:70,r:'比利时必须拿下'}};
function predict(h,a){var hr=(R[h]||60)+(HB[h]||0),ar=R[a]||60,diff=hr-ar,k=h+'vs'+a;if(SP[k]){var s=SP[k];return{hg:s.h,ag:s.a,conf:s.c,reason:s.r,res:s.h>s.a?'home':s.h<s.a?'away':'draw'}}if(diff>=25)return{hg:3,ag:0,conf:90,reason:h+'实力碾压',res:'home'};if(diff>=15)return{hg:2,ag:0,conf:80,reason:h+'占据优势',res:'home'};if(diff>=8)return{hg:2,ag:1,conf:70,reason:h+'小胜',res:'home'};if(diff>=3)return{hg:1,ag:0,conf:60,reason:h+'微弱优势',res:'home'};if(diff>=-3)return{hg:1,ag:1,conf:55,reason:'平局可能性大',res:'draw'};if(diff>=-8)return{hg:0,ag:1,conf:60,reason:a+'客场小胜',res:'away'};if(diff>=-15)return{hg:1,ag:2,conf:70,reason:a+'实力占优',res:'away'};return{hg:0,ag:3,conf:85,reason:a+'碾压',res:'away'}}
function isUpset(m){if(m.status!=='finished')return false;var hr=R[m.home]||60,ar=R[m.away]||60;if(hr-ar>=15&&m.homeScore<=m.awayScore)return true;if(ar-hr>=15&&m.awayScore<=m.homeScore)return true;if(m.home==='西班牙'&&m.away==='佛得角'&&m.homeScore===m.awayScore)return true;if(m.home==='巴西'&&m.away==='摩洛哥'&&m.homeScore===m.awayScore)return true;return false}
function getToday(){var n=new Date();return new Date(n.getTime()+8*3600000).toISOString().split('T')[0]}
function calcOdds(ch,p){var base;if(p.res==='home')base={home:1.5,draw:3.5,away:6.0};else if(p.res==='away')base={home:6.0,draw:3.5,away:1.5};else base={home:2.8,draw:2.5,away:2.8};var f=p.conf/100;if(ch===p.res)return Math.max(1.1,base[ch]*(1.5-f));return base[ch]*(0.8+f*0.3)}

// ===== 导航 =====
function pageNav(p){currentPage=p;document.querySelectorAll('.nav-item').forEach(function(n,i){n.classList.toggle('active',['main','mybets','friends','leaderboard','history'][i]===p)});if(p==='main')document.getElementById('mainTabs').classList.remove('hidden');else document.getElementById('mainTabs').classList.add('hidden');render()}
function switchTab(t){currentTab=t;document.querySelectorAll('#mainTabs .tab').forEach(function(el,i){el.classList.toggle('active',['today','upcoming','standings','champion'][i]===t)});render()}

// ===== 渲染 =====
function render(){
  var h='';
  if(currentPage==='main'){if(currentTab==='today')h=rToday();else if(currentTab==='upcoming')h=rUpcoming();else if(currentTab==='standings')h=rStandings();else if(currentTab==='champion')h=rChamp()}
  else if(currentPage==='mybets')h=rMyBets();
  else if(currentPage==='friends')h=rFriends();
  else if(currentPage==='leaderboard')h=rLeaderboard();
  else if(currentPage==='history')h=rHistory();
  document.getElementById('content').innerHTML=h;
}

function rToday(){
  var today=getToday(),ms=allMatches.filter(function(m){return m.date===today});
  if(!ms.length)return'<div class="empty">今日暂无比赛</div>';
  var h='<div class="section">今日赛事</div>';
  ms.forEach(function(m){var u=isUpset(m);h+='<div class="card'+(u?' upset':'')+'"><div class="match"><div class="team"><span class="flag">'+m.homeFlag+'</span><span class="tname">'+m.home+'</span></div><div class="score">'+(m.status==='finished'?m.homeScore+'-'+m.awayScore:(predict(m.home,m.away).hg+'-'+predict(m.home,m.away).ag))+'</div><div class="team away"><span class="flag">'+m.awayFlag+'</span><span class="tname">'+m.away+'</span></div></div><div class="info"><span>'+m.group+'组</span><span>'+(m.status==='finished'?'<span class="tag tag-f">已结束</span>'+(u?' <span class="tag tag-u">冷门</span>':''):'<span class="tag tag-p">AI预测</span>')+'</span></div>'+rBetUI(m)+'</div>'});
  return h;
}

function rUpcoming(){
  var up=allMatches.filter(function(m){return m.status==='upcoming'}).sort(function(a,b){return a.date.localeCompare(b.date)||a.time.localeCompare(b.time)});
  if(!up.length)return'<div class="empty">暂无待赛</div>';
  var h='<div class="section">即将开赛</div>';
  up.forEach(function(m){h+='<div class="card"><div class="match"><div class="team"><span class="flag">'+m.homeFlag+'</span><span class="tname">'+m.home+'</span></div><div class="score pred">'+predict(m.home,m.away).hg+'-'+predict(m.home,m.away).ag+'</div><div class="team away"><span class="flag">'+m.awayFlag+'</span><span class="tname">'+m.away+'</span></div></div><div class="info"><span>'+m.date+' '+m.time+' | '+m.group+'组</span><span class="tag tag-p">AI预测</span></div>'+rBetUI(m)+'</div>'});
  return h;
}

function rBetUI(m){
  var bet=myBets.find(function(b){return b.matchId===m.id&&b.status==='pending'});
  if(bet){var ct=bet.choice==='home'?bet.home:bet.choice==='away'?bet.away:'平局';return'<div class="my-bet"><span>已竞猜: <span class="my-bet-choice">'+ct+'</span> <span class="bet-tag bet-tag-pending">待结算</span></span><span>'+bet.amount+'金币 赔率'+bet.odds+'</span></div>'}
  if(m.status==='finished'){var won=myBets.find(function(b){return b.matchId===m.id&&b.status==='won'});var lost=myBets.find(function(b){return b.matchId===m.id&&b.status==='lost'});if(won)return'<div class="my-bet"><span>竞猜: <span class="my-bet-choice">'+(won.choice==='home'?won.home:won.choice==='away'?won.away:'平局')+'</span></span><span class="bet-tag bet-tag-won">赢得 '+won.potential+'金币</span></div>';if(lost)return'<div class="my-bet"><span>竞猜: <span class="my-bet-choice">'+(lost.choice==='home'?lost.home:lost.choice==='away'?lost.away:'平局')+'</span></span><span class="bet-tag bet-tag-lost">损失 '+lost.amount+'金币</span></div>';return''}
  var p=predict(m.home,m.away),sel=selectedBet[m.id];
  var oh=calcOdds('home',p).toFixed(1),od=calcOdds('draw',p).toFixed(1),oa=calcOdds('away',p).toFixed(1);
  var h='<div class="bet-area"><div class="bet-buttons">';
  h+='<div class="bet-btn'+(sel==='home'?' selected':'')+'" onclick="selectBet('+m.id+',\'home\')">'+m.home+'胜<br><span style="font-size:9px;color:#4a9eff">'+oh+'</span></div>';
  h+='<div class="bet-btn'+(sel==='draw'?' selected':'')+'" onclick="selectBet('+m.id+',\'draw\')">平局<br><span style="font-size:9px;color:#4a9eff">'+od+'</span></div>';
  h+='<div class="bet-btn'+(sel==='away'?' selected':'')+'" onclick="selectBet('+m.id+',\'away\')">'+m.away+'胜<br><span style="font-size:9px;color:#4a9eff">'+oa+'</span></div>';
  h+='</div>';
  if(sel){var amt=betAmounts[m.id]||100;var pot=Math.round(amt*calcOdds(sel,p));h+='<div class="bet-input"><label>下注:</label><input type="number" value="'+amt+'" min="10" max="'+(currentUser?currentUser.coins:1000)+'" onchange="setAmt('+m.id+',this.value)"> <span class="odds">可赢'+pot+'</span></div><button class="bet-confirm" onclick="confirmBet('+m.id+')">确认下注</button>'}
  h+='</div>';return h;
}

function selectBet(id,ch){selectedBet[id]=ch;render()}
function setAmt(id,v){betAmounts[id]=parseInt(v)||0}

function rMyBets(){
  var pending=myBets.filter(function(b){return b.status==='pending'});
  if(!pending.length)return'<div class="empty">暂无进行中的竞猜<br><br>去「即将开赛」页面下注吧</div>';
  var h='<div class="section">进行中的竞猜</div>';
  pending.forEach(function(b){var ct=b.choice==='home'?b.home:b.choice==='away'?b.away:'平局';h+='<div class="card"><div class="match"><div class="team"><span class="flag">'+b.homeFlag+'</span><span class="tname">'+b.home+'</span></div><div style="font-size:14px;color:#5a6580">VS</div><div class="team away"><span class="flag">'+b.awayFlag+'</span><span class="tname">'+b.away+'</span></div></div><div class="my-bet"><span>竞猜: <span class="my-bet-choice">'+ct+'</span></span><span>'+b.amount+'金币 赔率'+b.odds+' 可赢'+b.potential+'</span></div></div>'});
  return h;
}

function rLeaderboard(){
  var h='<div class="section">排行榜</div>';
  h+='<div class="lb-tabs"><div class="lb-tab'+(lbTab==='coins'?' active':'')+'" onclick="switchLB(\'coins\')">金币排行</div><div class="lb-tab'+(lbTab==='winrate'?' active':'')+'" onclick="switchLB(\'winrate\')">胜率排行</div><div class="lb-tab'+(lbTab==='profit'?' active':'')+'" onclick="switchLB(\'profit\')">盈利排行</div></div>';
  h+='<div id="lbContent"><div style="text-align:center;padding:20px">加载中...</div></div>';
  // 异步加载
  setTimeout(loadLB, 10);
  return h;
}

var lbData = null;
async function loadLB() {
  if (!lbData) {
    try { var res = await fetch(API + '/api/leaderboard'); lbData = await res.json(); } catch(e) { return; }
  }
  var list, h = '';
  if (lbTab === 'coins') {
    list = lbData.byCoins || [];
    list.forEach(function(u,i) {
      var rc = i<3?'lb-rank top'+(i+1):'lb-rank';
      h+='<div class="lb-row"><div class="'+rc+'">'+(i+1)+'</div><div class="lb-avatar">'+u.avatar+'</div><div class="lb-name">'+u.nickname+'</div><div class="lb-value coins">🪙'+u.coins+'</div></div>';
    });
  } else if (lbTab === 'winrate') {
    list = lbData.byWinRate || [];
    list.forEach(function(u,i) {
      var rc = i<3?'lb-rank top'+(i+1):'lb-rank';
      h+='<div class="lb-row"><div class="'+rc+'">'+(i+1)+'</div><div class="lb-avatar">'+u.avatar+'</div><div class="lb-name">'+u.nickname+' <span style="font-size:10px;color:#5a6580">'+u.wins+'/'+u.totalBets+'场</span></div><div class="lb-value wr">'+u.winRate+'%</div></div>';
    });
  } else {
    list = lbData.byProfit || [];
    list.forEach(function(u,i) {
      var rc = i<3?'lb-rank top'+(i+1):'lb-rank';
      var cls = u.profit>=0?'profit-pos':'profit-neg';
      h+='<div class="lb-row"><div class="'+rc+'">'+(i+1)+'</div><div class="lb-avatar">'+u.avatar+'</div><div class="lb-name">'+u.nickname+'</div><div class="lb-value '+cls+'">'+(u.profit>=0?'+':'')+u.profit+'</div></div>';
    });
  }
  if (!list.length) h = '<div class="empty">暂无数据，快来成为第一名！</div>';
  var el = document.getElementById('lbContent');
  if (el) el.innerHTML = h;
}

function switchLB(t){lbTab=t;lbData=null;render()}



// ===== 好友系统 =====
var friendsData = null;

function rFriends() {
  if (!currentUser) return '<div class="empty">请先登录</div>';
  setTimeout(loadFriendsData, 10);
  var inviteCode = currentUser.inviteCode || '';
  var h = '';

  // 邀请码板块
  h += '<div class="card" style="background:linear-gradient(135deg,#1a1f00,#0d1225);border:2px solid #ffd700;border-radius:14px;padding:16px;text-align:center;margin-bottom:12px">';
  h += '<div style="font-size:15px;font-weight:700;color:#ffd700;margin-bottom:10px">\ud83c\udf81 我的邀请码</div>';
  h += '<div style="background:#0a0e1a;padding:12px;border-radius:10px;margin-bottom:10px">';
  h += '<div style="font-size:28px;font-weight:800;color:#ffd700;letter-spacing:4px">' + (inviteCode || '---') + '</div>';
  h += '</div>';
  h += '<div style="font-size:12px;color:#8892b0;margin-bottom:10px">分享给好友，每邀请1人获得 <span style="color:#ffd700;font-weight:700">+200金币</span></div>';
  h += '<div style="display:flex;gap:8px;justify-content:center">';
  h += '<button onclick="copyInvite()" style="flex:1;padding:10px;background:#07c160;color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;max-width:140px">复制链接</button>';
  h += '<button onclick="shareInvite()" style="flex:1;padding:10px;background:linear-gradient(135deg,#ffd700,#ff6b35);color:#0a0e1a;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;max-width:140px">分享微信</button>';
  h += '</div>';
  h += '</div>';

  // 搜索添加好友
  h += '<div class="card" style="padding:12px">';
  h += '<div style="font-size:13px;font-weight:600;color:#e0e0e0;margin-bottom:8px">搜索添加好友</div>';
  h += '<div style="display:flex;gap:6px">';
  h += '<input type="text" id="searchWechat" placeholder="输入微信号搜索" style="flex:1;padding:8px;background:#0d1225;border:1px solid #2a3560;color:#ffd700;border-radius:8px;font-size:13px">';
  h += '<button onclick="searchFriend()" style="padding:8px 14px;background:#4a9eff;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer">搜索</button>';
  h += '</div>';
  h += '<div id="searchResult" style="margin-top:6px"></div>';
  h += '</div>';

  // 好友排行
  h += '<div class="section">好友排行</div>';
  h += '<div id="friendsRank"><div style="text-align:center;padding:20px;color:#5a6580">加载中...</div></div>';
  return h;
}


function copyInvite() {
  var link = window.location.origin + '/?invite=' + (currentUser.inviteCode || '');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(link).then(function(){alert('已复制邀请链接！分享给微信好友即可')});
  } else {
    var input = document.createElement('input');
    input.value = link;
    document.body.appendChild(input);
    input.select();
    document.execCommand('copy');
    document.body.removeChild(input);
    alert('已复制邀请链接！');
  }
}

function shareInvite() {
  var link = window.location.origin + '/?invite=' + (currentUser.inviteCode || '');
  var text = '我在2026世界杯AI预测中心等你！快来一起竞猜赢金币 🏆';
  // 尝试调用微信JS-SDK分享（如果在微信浏览器中）
  if (navigator.share) {
    navigator.share({title: '世界杯AI预测', text: text, url: link});
  } else {
    // 复制到剪贴板
    var fullText = text + '\n' + link;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(fullText).then(function(){alert('已复制分享内容！打开微信粘贴发送给好友')});
    } else {
      prompt('复制以下内容发送给微信好友:', fullText);
    }
  }
}

function loadFriendsData() {
  if (!currentUser) return;
  fetch(API + '/api/leaderboard/friends/' + currentUser.uid)
    .then(function(r){return r.json()})
    .then(function(data) {
      friendsData = data;
      var el = document.getElementById('friendsRank');
      if (!el) return;
      var h = '';
      var list = data.byCoins || [];
      if (!list.length) { el.innerHTML = '<div class="empty">还没有好友，快邀请吧！</div>'; return; }
      h += '<div class="card" style="padding:4px">';
      list.forEach(function(u) {
        var rc = u.rank<=3?'lb-rank top'+u.rank:'lb-rank';
        var me = u.isMe ? ' style="background:#1a2240"' : '';
        h += '<div class="lb-row"' + me + '><div class="' + rc + '">' + u.rank + '</div><div class="lb-avatar">' + u.avatar + '</div><div class="lb-name">' + u.nickname + (u.isMe?' (我)':'') + '</div><div class="lb-value coins">🪙' + u.coins + '</div></div>';
      });
      h += '</div>';
      el.innerHTML = h;
    }).catch(function(){});
}

function rHistory(){
  var settled=myBets.filter(function(b){return b.status==='won'||b.status==='lost'}).reverse();
  var wins=myBets.filter(function(b){return b.status==='won'}).length;
  var losses=myBets.filter(function(b){return b.status==='lost'}).length;
  var profit=settled.reduce(function(s,b){return s+b.profit},0);
  var wr=settled.length?Math.round(wins/settled.length*100):0;
  var h='<div class="stats"><div class="stat-box"><div class="stat-num">'+(currentUser?currentUser.coins:0)+'</div><div class="stat-label">金币</div></div><div class="stat-box"><div class="stat-num">'+myBets.length+'</div><div class="stat-label">总竞猜</div></div><div class="stat-box"><div class="stat-num" style="color:'+(profit>=0?'#4caf50':'#f44336')+'">'+(profit>=0?'+':'')+profit+'</div><div class="stat-label">盈亏</div></div><div class="stat-box"><div class="stat-num">'+wr+'%</div><div class="stat-label">胜率</div></div></div>';
  if(!myBets.length)return h+'<div class="empty">暂无竞猜记录</div>';
  h+='<div class="section">竞猜记录</div>';
  myBets.slice().reverse().forEach(function(b){var ct=b.choice==='home'?b.home:b.choice==='away'?b.away:'平局';var st,rt;if(b.status==='pending'){st='<span class="bet-tag bet-tag-pending">待结算</span>';rt='<span style="color:#ffc107">等待中</span>'}else if(b.status==='won'){st='<span class="bet-tag bet-tag-won">猜对</span>';rt='<span style="color:#4caf50">+'+b.potential+'</span>'}else{st='<span class="bet-tag bet-tag-lost">猜错</span>';rt='<span style="color:#f44336">-'+b.amount+'</span>'}h+='<div class="card" style="padding:8px 12px"><div style="display:flex;justify-content:space-between;align-items:center"><div><span style="font-size:12px">'+b.homeFlag+' '+b.home+' vs '+b.away+' '+b.awayFlag+'</span><br><span style="font-size:10px;color:#5a6580">竞猜: '+ct+' | '+b.amount+'金币 | 赔率'+b.odds+' '+st+'</span></div><div style="text-align:right;font-weight:700">'+rt+'</div></div></div>'});
  return h;
}

function rStandings(){
  var keys=Object.keys(allStandings).sort();
  if(!keys.length)return'<div class="empty">暂无积分</div>';
  var h='<div class="section">小组积分榜</div><div class="group-tabs">';
  keys.forEach(function(k){h+='<div class="gtab'+(k==='A'?' active':'')+'" onclick="showGroup(this,\''+k+'\')">'+k+'组</div>'});
  h+='</div>';
  keys.forEach(function(k,i){var g=allStandings[k];h+='<div class="card" id="g-'+k+'" style="'+(i>0?'display:none':'')+'"><table><tr><th>#</th><th style="text-align:left">球队</th><th>赛</th><th>胜</th><th>平</th><th>负</th><th>进</th><th>失</th><th>净</th><th>分</th></tr>';g.teams.forEach(function(t,j){var gd=t.gf-t.ga;h+='<tr><td>'+(j+1)+'</td><td class="tc"><span class="flag">'+t.flag+'</span> '+t.name+'</td><td>'+t.mp+'</td><td>'+t.w+'</td><td>'+t.d+'</td><td>'+t.l+'</td><td>'+t.gf+'</td><td>'+t.ga+'</td><td class="'+(gd>0?'gp':gd<0?'gn':'')+'">'+(gd>0?'+':'')+gd+'</td><td class="pts">'+t.pts+'</td></tr>'});h+='</table></div>'});
  return h;
}

function rChamp(){return'<div class="section">冠军预测</div><div class="card gold champ"><div class="champ-flag">🇦🇷</div><div class="champ-name">阿根廷</div><div class="champ-sub">卫冕冠军阵容成熟，梅西最后一舞</div><div class="champ-sub" style="margin-top:8px"><span style="color:#ffd700">夺冠概率: 20%</span></div><div class="champ-sub" style="margin-top:8px"><span style="color:#ffd700">候选: </span>🇫🇷法国18% · 🇩🇪德国15% · 🇧🇷巴西12% · 🇪🇸西班牙10%</div></div>'}

function showGroup(el,k){document.querySelectorAll('.gtab').forEach(function(t){t.classList.remove('active')});el.classList.add('active');document.querySelectorAll('.card[id^="g-"]').forEach(function(c){c.style.display='none'});document.getElementById('g-'+k).style.display='block'}

// ===== 启动 =====
currentUser = getUser();
var urlParams = new URLSearchParams(window.location.search);
var inviteFromUrl = urlParams.get('invite');

if (currentUser) {
  // 验证账号是否还存在
  fetch(API + '/api/user/' + currentUser.uid)
    .then(function(r) {
      if (r.ok) return r.json();
      throw new Error('not found');
    })
    .then(function(d) {
      if (d.user) {
        currentUser = d.user;
        saveUser(currentUser);
        updateUserUI();
        loadBets();
      } else {
        throw new Error('not found');
      }
    })
    .catch(function() {
      // 账号不存在，清除本地数据，重新登录
      localStorage.removeItem('wc_user');
      currentUser = null;
      updateUserUI();
      showLogin();
    });
} else {
  showLogin();
}
loadData();
setInterval(function(){loadData();loadBets()}, 60000);
</script>

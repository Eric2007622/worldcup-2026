<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026世界杯 AI预测中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:#0a0e1a;color:#e0e0e0;min-height:100vh;padding-bottom:70px}
.header{background:linear-gradient(135deg,#1a1f35,#0d1225);padding:20px;text-align:center;border-bottom:2px solid #2a3050;position:sticky;top:0;z-index:100}
.header h1{font-size:24px;background:linear-gradient(90deg,#ffd700,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{color:#8892b0;font-size:12px;margin-top:2px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.coin-box{display:flex;align-items:center;gap:6px;background:#1a2240;padding:4px 14px;border-radius:20px;font-size:14px;font-weight:700;color:#ffd700}
.update-time{color:#4a9eff;font-size:11px}
.container{max-width:900px;margin:0 auto;padding:12px}
.tabs{display:flex;background:#141929;border-radius:12px;padding:3px;margin-bottom:16px;position:sticky;top:90px;z-index:99}
.tab{flex:1;text-align:center;padding:9px 0;border-radius:10px;cursor:pointer;font-size:13px;color:#5a6580;transition:.2s}
.tab.active{background:#1a2a4a;color:#ffd700;font-weight:600}
.section{font-size:17px;font-weight:700;margin:18px 0 10px;padding-left:12px;border-left:4px solid #ffd700}
.card{background:#141929;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #1e2640}
.card.upset{border-color:#ff6b6b}
.match{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.team{display:flex;align-items:center;gap:8px;flex:1;min-width:90px}
.team.away{flex-direction:row-reverse;text-align:right}
.flag{font-size:22px}
.tname{font-size:14px;font-weight:600}
.score{font-size:24px;font-weight:800;min-width:60px;text-align:center;color:#fff}
.score.pred{color:#ffd700;font-size:18px}
.info{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:11px;color:#5a6580;flex-wrap:wrap;gap:4px}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:7px}
.tag-f{background:#1a2240;color:#5a6580}
.tag-p{background:#1a2a4a;color:#4a9eff}
.tag-u{background:#3a1a2a;color:#ff6b6b}
.conf{font-size:10px;padding:2px 7px;border-radius:7px}
.conf-h{background:#1b3a2a;color:#4caf50}
.conf-m{background:#3a3520;color:#ffc107}
.conf-l{background:#3a2a1a;color:#ff9800}
.reason{font-size:12px;color:#8892b0;margin-top:6px;line-height:1.4}

/* 竞猜按钮 */
.bet-area{margin-top:10px;padding-top:10px;border-top:1px solid #1e2640}
.bet-label{font-size:12px;color:#5a6580;margin-bottom:6px}
.bet-buttons{display:flex;gap:6px;flex-wrap:wrap}
.bet-btn{flex:1;padding:8px 4px;border:2px solid #2a3560;background:#0d1225;color:#8892b0;border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:.2s;min-width:70px}
.bet-btn:hover{border-color:#4a9eff;color:#4a9eff}
.bet-btn.selected{border-color:#ffd700;color:#ffd700;background:#1a1f00}
.bet-btn.win{border-color:#4caf50;color:#4caf50;background:#0d1a10}
.bet-btn.lose{border-color:#f44336;color:#f44336;background:#1a0d0d}
.bet-btn.settled{opacity:.7;cursor:default}
.bet-input{display:flex;align-items:center;gap:6px;margin-top:8px}
.bet-input label{font-size:12px;color:#5a6580;white-space:nowrap}
.bet-input input{width:80px;padding:6px 8px;background:#0d1225;border:1px solid #2a3560;color:#ffd700;border-radius:6px;font-size:13px;text-align:center}
.bet-input .odds{font-size:12px;color:#4a9eff}
.bet-confirm{margin-top:8px;padding:8px;background:linear-gradient(135deg,#ffd700,#ff6b35);color:#0a0e1a;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;width:100%;transition:.2s}
.bet-confirm:hover{opacity:.9}
.bet-confirm:disabled{background:#2a3050;color:#5a6580;cursor:not-allowed}
.bet-tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;margin-left:4px}
.bet-tag-won{background:#1b3a2a;color:#4caf50}
.bet-tag-lost{background:#3a1a1a;color:#f44336}
.bet-tag-pending{background:#3a3520;color:#ffc107}

/* 我的竞猜 */
.my-bet{margin-top:8px;padding:8px;background:#0d1225;border-radius:8px;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.my-bet-choice{color:#ffd700;font-weight:600}
.my-bet-amount{color:#8892b0}

/* 底部导航 */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0e1a;border-top:1px solid #1e2640;display:flex;z-index:100}
.nav-item{flex:1;text-align:center;padding:10px 0;font-size:12px;color:#5a6580;cursor:pointer}
.nav-item.active{color:#ffd700}
.nav-item .icon{font-size:18px;display:block}

/* 历史记录 */
.history-card{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #1a2040}
.history-card:last-child{border-bottom:none}
.history-left{flex:1}
.history-right{text-align:right}
.history-result{font-size:14px;font-weight:700;margin-top:2px}
.history-result.win{color:#4caf50}
.history-result.lose{color:#f44336}
.history-result.pending{color:#ffc107}

/* 统计 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat-box{background:#141929;border-radius:10px;padding:12px;text-align:center;border:1px solid #1e2640}
.stat-num{font-size:22px;font-weight:800;color:#ffd700}
.stat-label{font-size:11px;color:#5a6580;margin-top:2px}

/* 积分榜 */
.group-tabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.gtab{padding:5px 12px;background:#141929;border-radius:16px;font-size:12px;cursor:pointer;color:#5a6580;border:1px solid #1e2640}
.gtab.active{background:#1a2a4a;color:#ffd700;border-color:#ffd700}
table{width:100%;border-collapse:collapse;font-size:12px}
th{color:#5a6580;font-weight:600;padding:5px 3px;text-align:center;border-bottom:1px solid #1e2640}
td{padding:6px 3px;text-align:center;border-bottom:1px solid #1a2040}
td.tc{text-align:left}
.pts{font-weight:700;color:#4a9eff}
.gp{color:#4caf50}.gn{color:#f44336}

.champ{text-align:center;padding:20px}
.champ-flag{font-size:48px}.champ-name{font-size:28px;font-weight:800;color:#fff}
.champ-sub{color:#8892b0;font-size:13px;margin-top:8px;line-height:1.6}
.gold{background:linear-gradient(135deg,#2a1f00,#1a1500);border:2px solid #ffd700;border-radius:16px}
.hidden{display:none}
.empty{text-align:center;padding:40px;color:#5a6580;font-size:13px}
</style>
</head>
<body>

<div class="header">
  <h1>2026世界杯 AI预测中心</h1>
  <div class="sub">实时比分 + 智能预测 + 竞猜</div>
  <div class="top-bar">
    <div class="coin-box">🪙 <span id="coinDisplay">1000</span> 金币</div>
    <div class="update-time" id="updateTime">加载中...</div>
  </div>
</div>

<div class="container">
  <div class="tabs" id="mainTabs">
    <div class="tab active" onclick="switchTab('today')">今日赛事</div>
    <div class="tab" onclick="switchTab('upcoming')">即将开赛</div>
    <div class="tab" onclick="switchTab('standings')">积分榜</div>
    <div class="tab" onclick="switchTab('champion')">冠军预测</div>
  </div>
  <div id="content"><div style="text-align:center;padding:60px"><div style="display:inline-block;width:30px;height:30px;border:3px solid #1e2640;border-top:3px solid #ffd700;border-radius:50%;animation:spin 1s linear infinite"></div><br><br>正在加载...</div></div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="pageNav('main')"><span class="icon">⚽</span>赛事</div>
  <div class="nav-item" onclick="pageNav('mybets')"><span class="icon">🎯</span>我的竞猜</div>
  <div class="nav-item" onclick="pageNav('history')"><span class="icon">📊</span>战绩</div>
</div>

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script>
var API = '';
var allMatches = [], allStandings = {};
var currentPage = 'main', currentTab = 'today';

// ===== 本地存储 =====
function getCoins() { return parseInt(localStorage.getItem('wc_coins') || '1000'); }
function setCoins(v) { localStorage.setItem('wc_coins', v); document.getElementById('coinDisplay').textContent = v; }
function getBets() { try { return JSON.parse(localStorage.getItem('wc_bets') || '[]'); } catch(e) { return []; } }
function saveBets(bets) { localStorage.setItem('wc_bets', JSON.stringify(bets)); }

// 初始化金币
setCoins(getCoins());

// ===== 球队数据 =====
var R={'阿根廷':94,'法国':93,'英格兰':91,'巴西':90,'德国':89,'西班牙':89,'荷兰':87,'葡萄牙':87,'比利时':85,'克罗地亚':84,'哥伦比亚':83,'乌拉圭':82,'日本':80,'美国':79,'墨西哥':78,'韩国':77,'澳大利亚':76,'瑞士':76,'塞内加尔':75,'摩洛哥':75,'挪威':74,'瑞典':74,'埃及':73,'科特迪瓦':73,'厄瓜多尔':72,'土耳其':72,'巴拉圭':71,'苏格兰':70,'卡塔尔':69,'加拿大':68,'伊朗':67,'沙特阿拉伯':66,'突尼斯':65,'捷克':65,'波黑':64,'奥地利':64,'加纳':63,'新西兰':62,'巴拿马':61,'海地':58,'阿尔及利亚':62,'约旦':59,'伊拉克':58,'南非':57,'佛得角':55,'库拉索':50,'乌兹别克斯坦':56};
var HB={'美国':8,'墨西哥':8,'加拿大':6};
var SP={'法国vs塞内加尔':{h:2,a:0,c:85,r:'法国阵容豪华，姆巴佩领衔'},'伊拉克vs挪威':{h:1,a:2,c:65,r:'哈兰德坐镇挪威锋线'},'奥地利vs约旦':{h:2,a:1,c:70,r:'欧洲劲旅经验取胜'},'阿根廷vs阿尔及利亚':{h:3,a:0,c:90,r:'卫冕冠军首战，梅西最后一舞'},'英格兰vs克罗地亚':{h:2,a:1,c:65,r:'英格兰青春风暴对决克罗地亚'},'德国vs科特迪瓦':{h:3,a:1,c:75,r:'德国首轮7-1后士气高涨'},'美国vs澳大利亚':{h:2,a:1,c:70,r:'东道主状态火热'},'西班牙vs沙特阿拉伯':{h:2,a:0,c:75,r:'西班牙必全力争胜'},'比利时vs伊朗':{h:2,a:0,c:70,r:'比利时必须拿下'}};

function predict(home,away){
  var hr=(R[home]||60)+(HB[home]||0),ar=R[away]||60,diff=hr-ar;
  var k=home+'vs'+away;
  if(SP[k]){var s=SP[k];return{hg:s.h,ag:s.a,conf:s.c,reason:s.r,res:s.h>s.a?'home':s.h<s.a?'away':'draw'}}
  if(diff>=25)return{hg:3,ag:0,conf:90,reason:home+'实力碾压',res:'home'};
  if(diff>=15)return{hg:2,ag:0,conf:80,reason:home+'占据优势',res:'home'};
  if(diff>=8)return{hg:2,ag:1,conf:70,reason:home+'小胜',res:'home'};
  if(diff>=3)return{hg:1,ag:0,conf:60,reason:home+'微弱优势',res:'home'};
  if(diff>=-3)return{hg:1,ag:1,conf:55,reason:'平局可能性大',res:'draw'};
  if(diff>=-8)return{hg:0,ag:1,conf:60,reason:away+'客场小胜',res:'away'};
  if(diff>=-15)return{hg:1,ag:2,conf:70,reason:away+'实力占优',res:'away'};
  return{hg:0,ag:3,conf:85,reason:away+'碾压',res:'away'};
}

function isUpset(m){
  if(m.status!=='finished')return false;
  var hr=R[m.home]||60,ar=R[m.away]||60;
  if(hr-ar>=15&&m.homeScore<=m.awayScore)return true;
  if(ar-hr>=15&&m.awayScore<=m.homeScore)return true;
  if(m.home==='西班牙'&&m.away==='佛得角'&&m.homeScore===m.awayScore)return true;
  if(m.home==='巴西'&&m.away==='摩洛哥'&&m.homeScore===m.awayScore)return true;
  return false;
}

function getToday(){var n=new Date();return new Date(n.getTime()+8*3600000).toISOString().split('T')[0]}

// ===== 赔率计算 =====
function calcOdds(choice, p) {
  // choice: 'home'|'draw'|'away'
  // 基于AI预测概率生成赔率
  var base;
  if (p.res === 'home') base = {home: 1.5, draw: 3.5, away: 6.0};
  else if (p.res === 'away') base = {home: 6.0, draw: 3.5, away: 1.5};
  else base = {home: 2.8, draw: 2.5, away: 2.8};
  // 置信度越高，热门赔率越低
  var factor = p.conf / 100;
  if (choice === p.res) return Math.max(1.1, base[choice] * (1.5 - factor));
  return base[choice] * (0.8 + factor * 0.3);
}

// ===== 下注 =====
var selectedBet = {}; // {matchId: 'home'|'draw'|'away'}
var betAmounts = {}; // {matchId: amount}

function selectBet(matchId, choice) {
  selectedBet[matchId] = choice;
  render();
}

function setBetAmount(matchId, val) {
  betAmounts[matchId] = parseInt(val) || 0;
}

function confirmBet(matchId) {
  var choice = selectedBet[matchId];
  var amount = betAmounts[matchId] || 100;
  if (!choice) { wx ? wx.showToast({title:'请选择结果',icon:'none'}) : alert('请选择竞猜结果'); return; }
  var coins = getCoins();
  if (amount > coins) { alert('金币不足！当前: ' + coins); return; }
  if (amount < 10) { alert('最低下注 10 金币'); return; }

  var m = allMatches.find(function(x){return x.id===matchId});
  if (!m) return;
  var p = predict(m.home, m.away);
  var odds = calcOdds(choice, p);

  var bets = getBets();
  // 检查是否已下注
  var exist = bets.find(function(b){return b.matchId===matchId && b.status==='pending'});
  if (exist) { alert('这场比赛已经下注了！'); return; }

  bets.push({
    matchId: matchId,
    home: m.home, homeFlag: m.homeFlag,
    away: m.away, awayFlag: m.awayFlag,
    group: m.group, date: m.date,
    choice: choice,
    amount: amount,
    odds: Math.round(odds * 100) / 100,
    potential: Math.round(amount * odds),
    status: 'pending', // pending | won | lost
    result: null,
    profit: 0,
    time: new Date().toISOString()
  });
  saveBets(bets);
  setCoins(coins - amount);
  delete selectedBet[matchId];
  delete betAmounts[matchId];
  render();
}

// ===== 结算 =====
function settleBets() {
  var bets = getBets();
  var changed = false;
  bets.forEach(function(b) {
    if (b.status !== 'pending') return;
    var m = allMatches.find(function(x){return x.id===b.matchId});
    if (!m || m.status !== 'finished') return;

    var actualResult;
    if (m.homeScore > m.awayScore) actualResult = 'home';
    else if (m.homeScore < m.awayScore) actualResult = 'away';
    else actualResult = 'draw';

    b.result = actualResult;
    if (b.choice === actualResult) {
      b.status = 'won';
      b.profit = b.potential - b.amount;
      setCoins(getCoins() + b.potential);
    } else {
      b.status = 'lost';
      b.profit = -b.amount;
    }
    changed = true;
  });
  if (changed) saveBets(bets);
}

// ===== 数据加载 =====
async function loadData() {
  try {
    var [mr, sr] = await Promise.all([
      fetch(API + '/api/matches'),
      fetch(API + '/api/standings')
    ]);
    var md = await mr.json();
    var sd = await sr.json();
    allMatches = md.matches || [];
    allStandings = sd.groups || {};
    settleBets(); // 自动结算
  } catch(e) { console.error('API error:', e); }
  render();
  document.getElementById('updateTime').textContent = '更新: ' + new Date().toLocaleString('zh-CN', {hour:'2-digit',minute:'2-digit'});
}

// ===== 导航 =====
function pageNav(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(function(n,i){
    n.classList.toggle('active', ['main','mybets','history'][i]===page);
  });
  if (page === 'main') {
    document.getElementById('mainTabs').classList.remove('hidden');
  } else {
    document.getElementById('mainTabs').classList.add('hidden');
  }
  render();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('#mainTabs .tab').forEach(function(t,i){
    t.classList.toggle('active', ['today','upcoming','standings','champion'][i]===tab);
  });
  render();
}

// ===== 渲染 =====
function render() {
  var h = '';
  if (currentPage === 'main') {
    if (currentTab==='today') h = renderToday();
    else if (currentTab==='upcoming') h = renderUpcoming();
    else if (currentTab==='standings') h = renderStandings();
    else if (currentTab==='champion') h = renderChampion();
  } else if (currentPage === 'mybets') {
    h = renderMyBets();
  } else if (currentPage === 'history') {
    h = renderHistory();
  }
  document.getElementById('content').innerHTML = h;
}

function renderToday() {
  var today = getToday();
  var matches = allMatches.filter(function(m){return m.date===today});
  if (!matches.length) return '<div class="empty">今日暂无比赛</div>';
  var h = '<div class="section">今日赛事</div>';
  matches.forEach(function(m) {
    var upset = isUpset(m);
    var cls = upset ? 'card upset' : 'card';
    if (m.status==='finished') {
      h += '<div class="'+cls+'"><div class="match"><div class="team"><span class="flag">'+m.homeFlag+'</span><span class="tname">'+m.home+'</span></div><div class="score">'+m.homeScore+'-'+m.awayScore+'</div><div class="team away"><span class="flag">'+m.awayFlag+'</span><span class="tname">'+m.away+'</span></div></div><div class="info"><span>'+m.group+'组</span><span><span class="tag tag-f">已结束</span>'+(upset?' <span class="tag tag-u">冷门</span>':'')+'</span></div>'+renderBetResult(m.id)+'</div>';
    } else {
      h += renderMatchCard(m);
    }
  });
  return h;
}

function renderUpcoming() {
  var up = allMatches.filter(function(m){return m.status==='upcoming'}).sort(function(a,b){return a.date.localeCompare(b.date)||a.time.localeCompare(b.time)});
  if (!up.length) return '<div class="empty">暂无待赛</div>';
  var h = '<div class="section">即将开赛</div>';
  up.forEach(function(m) { h += renderMatchCard(m); });
  return h;
}

function renderMatchCard(m) {
  var p = predict(m.home, m.away);
  var sel = selectedBet[m.id];
  var bets = getBets();
  var myBet = bets.find(function(b){return b.matchId===m.id && b.status==='pending'});
  var h = '<div class="card">';
  h += '<div class="match"><div class="team"><span class="flag">'+m.homeFlag+'</span><span class="tname">'+m.home+'</span></div><div class="score pred">'+p.hg+'-'+p.ag+'</div><div class="team away"><span class="flag">'+m.awayFlag+'</span><span class="tname">'+m.away+'</span></div></div>';
  h += '<div class="info"><span>'+m.date+' '+m.time+' | '+m.group+'组</span><span class="tag tag-p">AI预测</span> <span class="conf conf-'+(p.conf>=80?'h':p.conf>=60?'m':'l')+'">'+p.conf+'%</span></div>';
  h += '<div class="reason">'+p.reason+'</div>';

  if (myBet) {
    // 已下注
    var choiceText = myBet.choice==='home'?myBet.home:myBet.choice==='away'?myBet.away:'平局';
    h += '<div class="my-bet"><span>已竞猜: <span class="my-bet-choice">'+choiceText+'</span></span><span class="my-bet-amount">'+myBet.amount+'金币 (赔率'+myBet.odds+')</span></div>';
  } else {
    // 竞猜区域
    var oddsH = calcOdds('home', p).toFixed(1);
    var oddsD = calcOdds('draw', p).toFixed(1);
    var oddsA = calcOdds('away', p).toFixed(1);
    h += '<div class="bet-area"><div class="bet-label">选择竞猜结果:</div><div class="bet-buttons">';
    h += '<div class="bet-btn'+(sel==='home'?' selected':'')+'" onclick="selectBet('+m.id+',\'home\')">'+m.home+'胜<br><span style="font-size:10px;color:#4a9eff">赔率 '+oddsH+'</span></div>';
    h += '<div class="bet-btn'+(sel==='draw'?' selected':'')+'" onclick="selectBet('+m.id+',\'draw\')">平局<br><span style="font-size:10px;color:#4a9eff">赔率 '+oddsD+'</span></div>';
    h += '<div class="bet-btn'+(sel==='away'?' selected':'')+'" onclick="selectBet('+m.id+',\'away\')">'+m.away+'胜<br><span style="font-size:10px;color:#4a9eff">赔率 '+oddsA+'</span></div>';
    h += '</div>';
    if (sel) {
      var potential = Math.round((betAmounts[m.id]||100) * calcOdds(sel, p));
      h += '<div class="bet-input"><label>下注金额:</label><input type="number" value="'+(betAmounts[m.id]||100)+'" min="10" max="'+getCoins()+'" onchange="setBetAmount('+m.id+',this.value)"><span>金币</span><span class="odds">预计赢得 '+potential+'</span></div>';
      h += '<button class="bet-confirm" onclick="confirmBet('+m.id+')">确认下注</button>';
    }
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function renderBetResult(matchId) {
  var bets = getBets();
  var b = bets.find(function(x){return x.matchId===matchId && x.status!=='pending'});
  if (!b) return '';
  var cls = b.status==='won'?'win':'lose';
  var text = b.status==='won'?'赢得 +'+b.potential+'金币':'损失 '+b.amount+'金币';
  return '<div class="my-bet"><span>竞猜: <span class="my-bet-choice">'+(b.choice==='home'?b.home:b.choice==='away'?b.away:'平局')+'</span></span><span class="bet-tag bet-tag-'+cls+'">'+text+'</span></div>';
}

function renderMyBets() {
  var bets = getBets().filter(function(b){return b.status==='pending'});
  if (!bets.length) return '<div class="empty">暂无进行中的竞猜</div>';
  var h = '<div class="section">进行中的竞猜</div>';
  bets.forEach(function(b) {
    var choiceText = b.choice==='home'?b.home:b.choice==='away'?b.away:'平局';
    h += '<div class="card"><div class="match"><div class="team"><span class="flag">'+b.homeFlag+'</span><span class="tname">'+b.home+'</span></div><div class="score pred" style="font-size:14px">VS</div><div class="team away"><span class="flag">'+b.awayFlag+'</span><span class="tname">'+b.away+'</span></div></div>';
    h += '<div class="my-bet"><span>竞猜: <span class="my-bet-choice">'+choiceText+'</span> <span class="bet-tag bet-tag-pending">待结算</span></span><span>'+b.amount+'金币 | 赔率'+b.odds+' | 预计赢得'+b.potential+'</span></div></div>';
  });
  return h;
}

function renderHistory() {
  var bets = getBets();
  var settled = bets.filter(function(b){return b.status==='won'||b.status==='lost'}).reverse();
  var totalBets = bets.length;
  var wins = bets.filter(function(b){return b.status==='won'}).length;
  var losses = bets.filter(function(b){return b.status==='lost'}).length;
  var pending = bets.filter(function(b){return b.status==='pending'}).length;
  var totalProfit = settled.reduce(function(s,b){return s+b.profit}, 0);
  var winRate = settled.length ? Math.round(wins/settled.length*100) : 0;

  var h = '<div class="stats">';
  h += '<div class="stat-box"><div class="stat-num">'+getCoins()+'</div><div class="stat-label">当前金币</div></div>';
  h += '<div class="stat-box"><div class="stat-num">'+totalBets+'</div><div class="stat-label">总竞猜</div></div>';
  h += '<div class="stat-box"><div class="stat-num" style="color:'+(totalProfit>=0?'#4caf50':'#f44336')+'">'+(totalProfit>=0?'+':'')+totalProfit+'</div><div class="stat-label">总盈亏</div></div>';
  h += '<div class="stat-box"><div class="stat-num">'+winRate+'%</div><div class="stat-label">胜率</div></div>';
  h += '</div>';

  if (!settled.length && !pending) return h + '<div class="empty">暂无竞猜记录</div>';

  h += '<div class="section">竞猜记录</div>';
  bets.slice().reverse().forEach(function(b) {
    var choiceText = b.choice==='home'?b.home:b.choice==='away'?b.away:'平局';
    var statusTag, resultText;
    if (b.status==='pending') {
      statusTag = '<span class="bet-tag bet-tag-pending">待结算</span>';
      resultText = '<div class="history-result pending">等待比赛结束</div>';
    } else if (b.status==='won') {
      statusTag = '<span class="bet-tag bet-tag-won">猜对</span>';
      resultText = '<div class="history-result win">+'+b.potential+' 金币</div>';
    } else {
      statusTag = '<span class="bet-tag bet-tag-lost">猜错</span>';
      resultText = '<div class="history-result lose">-'+b.amount+' 金币</div>';
    }
    h += '<div class="card"><div class="history-card"><div class="history-left"><div style="font-size:13px">'+b.homeFlag+' '+b.home+' vs '+b.away+' '+b.awayFlag+'</div><div style="font-size:11px;color:#5a6580;margin-top:2px">竞猜: '+choiceText+' | 下注: '+b.amount+' | 赔率: '+b.odds+' '+statusTag+'</div></div><div class="history-right">'+resultText+'</div></div></div>';
  });
  return h;
}

function renderStandings() {
  var keys = Object.keys(allStandings).sort();
  if (!keys.length) return '<div class="empty">暂无积分数据</div>';
  var h = '<div class="section">小组积分榜</div><div class="group-tabs">';
  keys.forEach(function(k){h+='<div class="gtab'+(k==='A'?' active':'')+'" onclick="showGroup(this,\''+k+'\')">'+k+'组</div>'});
  h += '</div>';
  keys.forEach(function(k,i){
    var g=allStandings[k];
    h+='<div class="card" id="g-'+k+'" style="'+(i>0?'display:none':'')+'"><table><tr><th>#</th><th style="text-align:left">球队</th><th>赛</th><th>胜</th><th>平</th><th>负</th><th>进</th><th>失</th><th>净</th><th>分</th></tr>';
    g.teams.forEach(function(t,j){
      var gd=t.gf-t.ga;
      h+='<tr><td>'+(j+1)+'</td><td class="tc"><span class="flag">'+t.flag+'</span> '+t.name+'</td><td>'+t.mp+'</td><td>'+t.w+'</td><td>'+t.d+'</td><td>'+t.l+'</td><td>'+t.gf+'</td><td>'+t.ga+'</td><td class="'+(gd>0?'gp':gd<0?'gn':'')+'">'+(gd>0?'+':'')+gd+'</td><td class="pts">'+t.pts+'</td></tr>';
    });
    h+='</table></div>';
  });
  return h;
}

function renderChampion() {
  return '<div class="section">冠军预测</div><div class="card gold champ"><div class="champ-flag">🇦🇷</div><div class="champ-name">阿根廷</div><div class="champ-sub">卫冕冠军阵容成熟，梅西最后一舞，恩佐/阿尔瓦雷斯接棒</div><div class="champ-sub" style="margin-top:12px"><span style="color:#ffd700">夺冠概率: 20%</span></div><div class="champ-sub" style="margin-top:12px"><span style="color:#ffd700">热门候选: </span>🇫🇷法国18% · 🇩🇪德国15% · 🇧🇷巴西12% · 🇪🇸西班牙10% · 🏴󠁧󠁢󠁥󠁮󠁧󠁿英格兰10%</div></div>';
}

function showGroup(el,key){
  document.querySelectorAll('.gtab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  document.querySelectorAll('.card[id^="g-"]').forEach(function(c){c.style.display='none'});
  document.getElementById('g-'+key).style.display='block';
}

// 启动
loadData();
setInterval(loadData, 60000);
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026世界杯 AI预测中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:#0a0e1a;color:#e0e0e0;min-height:100vh;padding-bottom:70px}
.header{background:linear-gradient(135deg,#1a1f35,#0d1225);padding:16px 20px;text-align:center;border-bottom:2px solid #2a3050;position:sticky;top:0;z-index:100}
.header h1{font-size:22px;background:linear-gradient(90deg,#ffd700,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-top:6px;gap:8px}
.coin-box{display:flex;align-items:center;gap:4px;background:#1a2240;padding:4px 12px;border-radius:16px;font-size:13px;font-weight:700;color:#ffd700}
.user-box{display:flex;align-items:center;gap:6px;background:#1a2240;padding:4px 12px;border-radius:16px;font-size:13px;cursor:pointer}
.user-box .avatar{font-size:16px}
.update-time{color:#4a9eff;font-size:10px}
.container{max-width:900px;margin:0 auto;padding:12px}
.tabs{display:flex;background:#141929;border-radius:10px;padding:3px;margin-bottom:14px;position:sticky;top:80px;z-index:99}
.tab{flex:1;text-align:center;padding:8px 0;border-radius:8px;cursor:pointer;font-size:12px;color:#5a6580;transition:.2s}
.tab.active{background:#1a2a4a;color:#ffd700;font-weight:600}
.section{font-size:16px;font-weight:700;margin:16px 0 8px;padding-left:10px;border-left:3px solid #ffd700}
.card{background:#141929;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #1e2640}
.card.upset{border-color:#ff6b6b}
.match{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.team{display:flex;align-items:center;gap:6px;flex:1;min-width:80px}
.team.away{flex-direction:row-reverse;text-align:right}
.flag{font-size:20px}.tname{font-size:13px;font-weight:600}
.score{font-size:22px;font-weight:800;min-width:55px;text-align:center;color:#fff}
.score.pred{color:#ffd700;font-size:16px}
.info{display:flex;justify-content:space-between;align-items:center;margin-top:4px;font-size:10px;color:#5a6580;flex-wrap:wrap;gap:3px}
.tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:5px}
.tag-f{background:#1a2240;color:#5a6580}.tag-p{background:#1a2a4a;color:#4a9eff}.tag-u{background:#3a1a2a;color:#ff6b6b}
.conf{font-size:9px;padding:1px 6px;border-radius:5px}
.conf-h{background:#1b3a2a;color:#4caf50}.conf-m{background:#3a3520;color:#ffc107}.conf-l{background:#3a2a1a;color:#ff9800}
.reason{font-size:11px;color:#8892b0;margin-top:4px;line-height:1.3}
.bet-area{margin-top:8px;padding-top:8px;border-top:1px solid #1e2640}
.bet-buttons{display:flex;gap:5px;flex-wrap:wrap}
.bet-btn{flex:1;padding:7px 4px;border:2px solid #2a3560;background:#0d1225;color:#8892b0;border-radius:7px;cursor:pointer;font-size:11px;text-align:center;transition:.2s;min-width:60px}
.bet-btn:hover{border-color:#4a9eff;color:#4a9eff}
.bet-btn.selected{border-color:#ffd700;color:#ffd700;background:#1a1f00}
.bet-input{display:flex;align-items:center;gap:5px;margin-top:6px;flex-wrap:wrap}
.bet-input label{font-size:11px;color:#5a6580}
.bet-input input{width:70px;padding:5px 6px;background:#0d1225;border:1px solid #2a3560;color:#ffd700;border-radius:5px;font-size:12px;text-align:center}
.bet-input .odds{font-size:11px;color:#4a9eff}
.bet-confirm{margin-top:6px;padding:7px;background:linear-gradient(135deg,#ffd700,#ff6b35);color:#0a0e1a;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;width:100%}
.bet-confirm:disabled{background:#2a3050;color:#5a6580;cursor:not-allowed}
.my-bet{margin-top:6px;padding:6px;background:#0d1225;border-radius:6px;font-size:11px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.my-bet-choice{color:#ffd700;font-weight:600}
.bet-tag{font-size:9px;padding:1px 5px;border-radius:3px}
.bet-tag-won{background:#1b3a2a;color:#4caf50}.bet-tag-lost{background:#3a1a1a;color:#f44336}.bet-tag-pending{background:#3a3520;color:#ffc107}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0e1a;border-top:1px solid #1e2640;display:flex;z-index:100}
.nav-item{flex:1;text-align:center;padding:8px 0;font-size:11px;color:#5a6580;cursor:pointer}
.nav-item.active{color:#ffd700}
.nav-item .icon{font-size:16px;display:block}
.group-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.gtab{padding:4px 10px;background:#141929;border-radius:14px;font-size:11px;cursor:pointer;color:#5a6580;border:1px solid #1e2640}
.gtab.active{background:#1a2a4a;color:#ffd700;border-color:#ffd700}
table{width:100%;border-collapse:collapse;font-size:11px}
th{color:#5a6580;font-weight:600;padding:4px 2px;text-align:center;border-bottom:1px solid #1e2640}
td{padding:5px 2px;text-align:center;border-bottom:1px solid #1a2040}
td.tc{text-align:left}.pts{font-weight:700;color:#4a9eff}
.gp{color:#4caf50}.gn{color:#f44336}
.champ{text-align:center;padding:16px}
.champ-flag{font-size:40px}.champ-name{font-size:24px;font-weight:800;color:#fff}
.champ-sub{color:#8892b0;font-size:12px;margin-top:6px;line-height:1.5}
.gold{background:linear-gradient(135deg,#2a1f00,#1a1500);border:2px solid #ffd700;border-radius:14px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.stat-box{background:#141929;border-radius:8px;padding:10px;text-align:center;border:1px solid #1e2640}
.stat-num{font-size:18px;font-weight:800;color:#ffd700}
.stat-label{font-size:10px;color:#5a6580;margin-top:1px}
.empty{text-align:center;padding:40px;color:#5a6580;font-size:12px}
.hidden{display:none}

/* 登录弹窗 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#141929;border-radius:16px;padding:24px;width:90%;max-width:360px;border:1px solid #2a3050;text-align:center}
.modal h2{font-size:20px;color:#ffd700;margin-bottom:16px}
.modal input{width:100%;padding:10px;background:#0d1225;border:1px solid #2a3560;color:#ffd700;border-radius:8px;font-size:14px;text-align:center;margin-bottom:12px}
.modal .submit{padding:10px;background:linear-gradient(135deg,#ffd700,#ff6b35);color:#0a0e1a;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;width:100%}
.modal .skip{margin-top:8px;font-size:12px;color:#5a6580;cursor:pointer}
.avatar-select{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:12px}
.avatar-opt{font-size:24px;cursor:pointer;padding:4px;border-radius:8px;border:2px solid transparent;transition:.2s}
.avatar-opt.selected{border-color:#ffd700;background:#1a1f00}

/* 排行榜 */
.lb-tabs{display:flex;gap:4px;margin-bottom:10px}
.lb-tab{flex:1;text-align:center;padding:6px;border-radius:6px;font-size:11px;cursor:pointer;color:#5a6580;background:#141929}
.lb-tab.active{background:#1a2a4a;color:#ffd700}
.lb-row{display:flex;align-items:center;padding:8px;border-bottom:1px solid #1a2040;gap:8px}
.lb-rank{width:24px;text-align:center;font-weight:700;font-size:14px}
.lb-rank.top1{color:#ffd700}.lb-rank.top2{color:#c0c0c0}.lb-rank.top3{color:#cd7f32}
.lb-avatar{font-size:18px}.lb-name{flex:1;font-size:13px}
.lb-value{font-size:13px;font-weight:700;text-align:right;min-width:60px}
.lb-value.coins{color:#ffd700}.lb-value.wr{color:#4caf50}.lb-value.profit-pos{color:#4caf50}.lb-value.profit-neg{color:#f44336}
/* Toast 通知 */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);background:#141929;border:2px solid #4caf50;border-radius:16px;padding:24px 32px;z-index:300;text-align:center;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.toast-icon{font-size:40px;margin-bottom:8px}
.toast-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px}
.toast-sub{font-size:13px;color:#8892b0}
.toast-ok{margin-top:12px;padding:8px 24px;background:#4caf50;color:#fff;border:none;border-radius:20px;font-size:13px;cursor:pointer}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:299;opacity:0;transition:.3s;pointer-events:none}
.overlay.show{opacity:1;pointer-events:auto}
</style>
</head>
<body>

<div class="header">
  <h1>2026世界杯 AI预测中心</h1>
  <div class="top-bar">
    <div class="user-box" id="userBox" onclick="showProfile()"><span class="avatar" id="userAvatar">👤</span><span id="userName">点击登录</span></div>
    <div class="coin-box" onclick="claimDaily()" id="coinBox" style="cursor:pointer">🪙 <span id="coinDisplay">-</span> <span id="dailyBtn" style="display:none;margin-left:4px;background:#ff6b35;padding:1px 6px;border-radius:8px;font-size:10px">签到+500</span></div>
    <div class="update-time" id="updateTime">-</div>
  </div>
</div>

<div class="container">
  <div class="tabs" id="mainTabs">
    <div class="tab active" onclick="switchTab('today')">今日赛事</div>
    <div class="tab" onclick="switchTab('upcoming')">即将开赛</div>
    <div class="tab" onclick="switchTab('standings')">积分榜</div>
    <div class="tab" onclick="switchTab('champion')">冠军预测</div>
  </div>
  <div id="content"><div style="text-align:center;padding:40px"><div style="display:inline-block;width:24px;height:24px;border:3px solid #1e2640;border-top:3px solid #ffd700;border-radius:50%;animation:spin 1s linear infinite"></div></div></div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="pageNav('main')"><span class="icon">⚽</span>赛事</div>
  <div class="nav-item" onclick="pageNav('mybets')"><span class="icon">🎯</span>竞猜</div>
  <div class="nav-item" onclick="pageNav('friends')"><span class="icon">👥</span>好友</div>
  <div class="nav-item" onclick="pageNav('leaderboard')"><span class="icon">🏆</span>排行</div>
  <div class="nav-item" onclick="pageNav('history')"><span class="icon">📊</span>战绩</div>
</div>

<div id="profileModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2>个人资料</h2>
    <div style="text-align:center;margin-bottom:12px">
      <span id="profileAvatar" style="font-size:40px">😎</span>
      <div id="profileName" style="font-size:16px;font-weight:700;color:#fff;margin-top:4px">-</div>
      <div id="profileCoins" style="font-size:13px;color:#ffd700">🪙 - 金币</div>
    </div>
    <div style="text-align:left;margin-bottom:12px">
      <div style="font-size:12px;color:#5a6580;margin-bottom:4px">微信号</div>
      <div id="wechatStatus" style="font-size:12px;color:#5a6580;margin-bottom:6px">未绑定</div>
      <div style="display:flex;gap:6px">
        <input type="text" id="wechatInput" placeholder="输入微信号" style="flex:1;padding:8px;background:#0d1225;border:1px solid #2a3560;color:#ffd700;border-radius:8px;font-size:13px;text-align:center">
        <button onclick="saveWechat()" style="padding:8px 14px;background:#4a9eff;color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer">绑定</button>
      </div>
    </div>
    <button onclick="closeProfile()" style="padding:10px;background:#1e2640;color:#8892b0;border:none;border-radius:8px;cursor:pointer;font-size:13px;width:100%">关闭</button>
  </div>
</div>

<div id="loginModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div style="display:flex;gap:0;margin-bottom:16px;background:#0d1225;border-radius:8px;padding:3px">
      <div id="tabReg" style="flex:1;text-align:center;padding:8px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:#ffd700;background:#1a2240" onclick="switchAuthTab('register')">注册</div>
      <div id="tabLogin" style="flex:1;text-align:center;padding:8px;border-radius:6px;cursor:pointer;font-size:13px;color:#5a6580" onclick="switchAuthTab('login')">登录</div>
    </div>

    <!-- 注册 -->
    <div id="regPanel">
      <div class="avatar-select">
        <span class="avatar-opt selected" onclick="pickAvatar(this,'😎')">😎</span>
        <span class="avatar-opt" onclick="pickAvatar(this,'🦁')">🦁</span>
        <span class="avatar-opt" onclick="pickAvatar(this,'⚽')">⚽</span>
        <span class="avatar-opt" onclick="pickAvatar(this,'🏆')">🏆</span>
        <span class="avatar-opt" onclick="pickAvatar(this,'🎯')">🎯</span>
        <span class="avatar-opt" onclick="pickAvatar(this,'🔥')">🔥</span>
        <span class="avatar-opt" onclick="pickAvatar(this,'👑')">👑</span>
        <span class="avatar-opt" onclick="pickAvatar(this,'🎮')">🎮</span>
      </div>
      <input type="text" id="regNickname" placeholder="设置昵称(唯一)" maxlength="12">
      <input type="text" id="regWechat" placeholder="微信号(登录凭证)" maxlength="20" style="width:100%;padding:10px;background:#0d1225;border:1px solid #2a3560;color:#ffd700;border-radius:8px;font-size:14px;text-align:center;margin-bottom:12px">
      <input type="text" id="regInvite" placeholder="邀请码(选填)" maxlength="20" style="width:100%;padding:10px;background:#0d1225;border:1px solid #2a3560;color:#8892b0;border-radius:8px;font-size:13px;text-align:center;margin-bottom:12px;letter-spacing:2px">
      <button class="submit" onclick="doRegister()">注册</button>
    </div>

    <!-- 登录 -->
    <div id="loginPanel" style="display:none">
      <div style="font-size:40px;margin-bottom:12px">👋</div>
      <input type="text" id="loginWechat" placeholder="输入微信号" maxlength="20" style="width:100%;padding:12px;background:#0d1225;border:1px solid #2a3560;color:#ffd700;border-radius:8px;font-size:16px;text-align:center;margin-bottom:16px">
      <button class="submit" onclick="doLogin()">登录</button>
      <div style="font-size:11px;color:#5a6580;margin-top:8px">输入注册时的微信号即可找回账号</div>
    </div>

    <div class="skip" onclick="doGuestLogin()">先看看再说</div>
  </div>
</div>

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script>
var API = '';
var allMatches = [], allStandings = {};
var currentPage = 'main', currentTab = 'today';
var currentUser = null;
var selectedBet = {}, betAmounts = {};
var selectedAvatar = '😎';
var lbTab = 'coins';

// ===== XSS 防御 =====
var _amp=String.fromCharCode(38),_lt=String.fromCharCode(60),_gt=String.fromCharCode(62),_qt=String.fromCharCode(34),_ap=String.fromCharCode(39);
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,_amp+'amp;').replace(/</g,_amp+'lt;').replace(/>/g,_amp+'gt;').replace(/"/g,_amp+'quot;').replace(/'/g,_amp+'#39;');
}

// ===== 用户系统 =====
function getUser() { try { return JSON.parse(localStorage.getItem('wc_user')); } catch(e) { return null; } }
function saveUser(u) { localStorage.setItem('wc_user', JSON.stringify(u)); currentUser = u; updateUserUI(); }
function updateUserUI() {
  if (currentUser) {
    document.getElementById('userAvatar').textContent = currentUser.avatar || '😎';
    document.getElementById('userName').textContent = currentUser.nickname + (currentUser.wechatId ? ' 📱' : '');
    document.getElementById('coinDisplay').textContent = currentUser.coins;
    checkDaily();
  }
}

function showLogin() { document.getElementById('loginModal').style.display='flex'; }
function showProfile() {
  if (!currentUser) { showLogin(); return; }
  document.getElementById('profileAvatar').textContent = currentUser.avatar || '😎';
  document.getElementById('profileName').textContent = currentUser.nickname;
  document.getElementById('profileCoins').textContent = '🪙 ' + currentUser.coins + ' 金币';
  document.getElementById('wechatInput').value = currentUser.wechatId || '';
  document.getElementById('wechatStatus').textContent = currentUser.wechatId ? '已绑定: ' + currentUser.wechatId : '未绑定';
  document.getElementById('wechatStatus').style.color = currentUser.wechatId ? '#4caf50' : '#5a6580';
  document.getElementById('profileModal').style.display = 'flex';
}
function closeProfile() { document.getElementById('profileModal').style.display = 'none'; }
function saveWechat() {
  var wid = document.getElementById('wechatInput').value.trim();
  if (!wid) { alert('请输入微信号'); return; }
  fetch(API + '/api/user/' + currentUser.uid + '/wechat', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ wechatId: wid })
  }).then(function(r){return r.json()}).then(function(d) {
    if (d.error) { alert(d.error); return; }
    currentUser.wechatId = wid;
    saveUser(currentUser);
    document.getElementById('wechatStatus').textContent = '已绑定: ' + wid;
    document.getElementById('wechatStatus').style.color = '#4caf50';
    alert('微信号绑定成功!');
  }).catch(function(){ alert('保存失败'); });
}
function closeLogin() { document.getElementById('loginModal').style.display='none'; }
function pickAvatar(el, av) {
  document.querySelectorAll('.avatar-opt').forEach(function(e){e.classList.remove('selected')});
  el.classList.add('selected');
  selectedAvatar = av;
}

function switchAuthTab(tab) {
  document.getElementById('tabReg').style.color = tab === 'register' ? '#ffd700' : '#5a6580';
  document.getElementById('tabReg').style.background = tab === 'register' ? '#1a2240' : 'transparent';
  document.getElementById('tabLogin').style.color = tab === 'login' ? '#ffd700' : '#5a6580';
  document.getElementById('tabLogin').style.background = tab === 'login' ? '#1a2240' : 'transparent';
  document.getElementById('regPanel').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('loginPanel').style.display = tab === 'login' ? 'block' : 'none';
}

function doRegister() {
  var nickname = document.getElementById('regNickname').value.trim();
  var wechatId = document.getElementById('regWechat').value.trim();
  var inviteCode = document.getElementById('regInvite').value.trim();
  if (!nickname) { showToast('', '请输入昵称', ''); return; }
  if (!wechatId) { showToast('', '请输入微信号', ''); return; }
  closeLogin();
  fetch(API + '/api/user/invite-login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ nickname: nickname, avatar: selectedAvatar, inviteCode: inviteCode, wechatId: wechatId })
  }).then(function(r) {
    return r.json().then(function(data) {
      if (!r.ok) throw new Error(data.error || '注册失败');
      return data;
    });
  }).then(function(d) {
    if (d.user) {
      saveUser(d.user);
      updateUserUI();
      var msg = d.inviter ? '通过 ' + d.inviter + ' 的邀请注册成功!' : '注册成功!';
      showToast('🎉', msg, '获得 ' + (d.user.coins) + ' 金币');
    }
  }).catch(function(e) {
    showError('❌', '注册失败', e.message || '请重试');
  });
}

function doLogin() {
  var wxid = document.getElementById('loginWechat').value.trim();
  if (!wxid) { showToast('', '请输入微信号', ''); return; }
  closeLogin();
  fetch(API + '/api/user/login-by-wechat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({wechatId: wxid})
  }).then(function(r) {
    return r.json().then(function(data) {
      if (!r.ok) throw new Error(data.error || '登录失败');
      return data;
    });
  }).then(function(d) {
    if (d.user) {
      saveUser(d.user);
      updateUserUI();
      loadBets();
      showToast('👋', '欢迎回来!', d.user.nickname);
    }
  }).catch(function(e) {
    showError('❌', '登录失败', e.message || '请重试');
  });
}

function doGuestLogin() {
  closeLogin();
  var guest = { uid: 'guest_' + Date.now(), nickname: '游客', avatar: '👤', coins: 0, totalBets: 0, wins: 0, losses: 0, profit: 0, inviteCode: '', wechatId: '' };
  saveUser(guest);
  updateUserUI();
  showToast('👤', '游客模式', '注册后可竞猜赢金币');
}

// ===== 下注 =====
async function confirmBet(matchId) {
  if (!currentUser) { showLogin(); return; }
  var choice = selectedBet[matchId];
  var amount = betAmounts[matchId] || 100;
  if (!choice) { alert('请选择竞猜结果'); return; }

  try {
    var res = await fetch(API + '/api/bet', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ uid: currentUser.uid, matchId: matchId, choice: choice, amount: amount })
    });
    var data = await res.json();
    if (data.error) { alert(data.error); return; }
    currentUser.coins = data.coins;
    saveUser(currentUser);
    delete selectedBet[matchId];
    delete betAmounts[matchId];
    render();
    loadBets();

// ===== 球队数据 =====
// ===== Poisson 回归预测引擎 =====
var ELO={'阿根廷':1850,'法国':1830,'英格兰':1800,'巴西':1790,'德国':1780,'西班牙':1780,'荷兰':1750,'葡萄牙':1750,'比利时':1720,'克罗地亚':1710,'哥伦比亚':1700,'乌拉圭':1690,'日本':1660,'美国':1650,'墨西哥':1640,'韩国':1630,'澳大利亚':1620,'瑞士':1620,'塞内加尔':1610,'摩洛哥':1610,'挪威':1600,'瑞典':1600,'埃及':1590,'科特迪瓦':1590,'厄瓜多尔':1580,'土耳其':1580,'巴拉圭':1570,'苏格兰':1560,'卡塔尔':1550,'加拿大':1540,'伊朗':1530,'沙特阿拉伯':1520,'突尼斯':1510,'捷克':1510,'波黑':1500,'奥地利':1500,'加纳':1490,'新西兰':1480,'巴拿马':1470,'海地':1440,'阿尔及利亚':1480,'约旦':1450,'伊拉克':1440,'南非':1430,'佛得角':1410,'库拉索':1380,'乌兹别克斯坦':1420,'刚果(金)':1460};
var HOME_BONUS={'美国':100,'墨西哥':100,'加拿大':80};
var GLOBAL_AVG=2.6;
function _fact(n){if(n<=1)return 1;var r=1;for(var i=2;i<=n;i++)r*=i;return r}
function _poisson(k,l){return Math.exp(-l)*Math.pow(l,k)/_fact(k)}
function _eloStr(elo){return Math.exp((elo-1500)/1000)}
function _xg(home,away){var he=(ELO[home]||1400)+(HOME_BONUS[home]||0),ae=ELO[away]||1400,hs=_eloStr(he),as=_eloStr(ae),avg=(hs+as)/2,ha=hs/avg,aa=as/avg;return{h:Math.max(0.4,Math.min(3.5,GLOBAL_AVG*0.55*ha/(1/aa))),a:Math.max(0.3,Math.min(3.0,GLOBAL_AVG*0.45*aa/(1/hs)))}}
function _probs(xh,xa){var hw=0,dr=0,aw=0;for(var h=0;h<=6;h++)for(var a=0;a<=6;a++){var p=_poisson(h,xh)*_poisson(a,xa);if(h>a)hw+=p;else if(h===a)dr+=p;else aw+=p}return{hw:hw,dr:dr,aw:aw}}
function _score(xh,xa){var bh=0,ba=0,bp=0;for(var h=0;h<=6;h++)for(var a=0;a<=6;a++){var p=_poisson(h,xh)*_poisson(a,xa);if(p>bp){bp=p;bh=h;ba=a}}return{h:bh,a:ba}}
function _conf(p){var arr=[p.hw,p.dr,p.aw].sort(function(a,b){return b-a});var margin=arr[0]-arr[1];return Math.max(30,Math.min(95,Math.round(30+margin*130)))}
function predict(home,away){var x=_xg(home,away),p=_probs(x.h,x.a),s=_score(x.h,x.a),c=_conf(p),res=p.hw>p.aw?'home':p.aw>p.hw?'away':'draw';var diff=p.hw-p.aw,reason;if(diff>0.4)reason=home+'实力占优，预计进球期望 '+x.h.toFixed(1)+'-'+x.a.toFixed(1)+'，大概率取胜';else if(diff>0.15)reason=home+'小幅领先，但'+away+'有反击能力';else if(diff>-0.15)reason='两队实力接近，'+(x.h+x.a>2.8?'进球数可能较多':'可能低比分');else if(diff>-0.4)reason=away+'客场作战仍有优势';else reason=away+'实力明显强于'+home;return{hg:s.h,ag:s.a,conf:c,reason:reason,res:res,xg:{home:x.h,away:x.a},probs:{hw:(p.hw*100).toFixed(1),dr:(p.dr*100).toFixed(1),aw:(p.aw*100).toFixed(1)}}}
function isUpset(m){if(m.status!=='finished')return false;var x=_xg(m.home,m.away),p=_probs(x.h,x.a);if(p.hw>0.65&&m.homeScore<=m.awayScore)return true;if(p.aw>0.65&&m.awayScore<=m.homeScore)return true;if(m.home==='西班牙'&&m.away==='佛得角'&&m.homeScore===m.awayScore)return true;if(m.home==='巴西'&&m.away==='摩洛哥'&&m.homeScore===m.awayScore)return true;return false}
function getToday(){var n=new Date();return new Date(n.getTime()+8*3600000).toISOString().split('T')[0]}
function calcOdds(ch,p){var pr=p.probs||p;var raw={home:1/pr.hw,draw:1/pr.dr,away:1/pr.aw};var adj={home:raw.home*0.92,draw:raw.draw*0.92,away:raw.away*0.92};return Math.max(1.05,parseFloat((adj[ch]||2.0).toFixed(2)))}

function rBetUI(m){
  var bet=myBets.find(function(b){return b.matchId===m.id&&b.status==='pending'});
  if(bet){var ct=bet.choice==='home'?bet.home:bet.choice==='away'?bet.away:'平局';return'<div class="my-bet"><span>已竞猜: <span class="my-bet-choice">'+ct+'</span> <span class="bet-tag bet-tag-pending">待结算</span></span><span>'+bet.amount+'金币 赔率'+bet.odds+'</span></div>'}
  if(m.status==='finished'){var won=myBets.find(function(b){return b.matchId===m.id&&b.status==='won'});var lost=myBets.find(function(b){return b.matchId===m.id&&b.status==='lost'});if(won)return'<div class="my-bet"><span>竞猜: <span class="my-bet-choice">'+(won.choice==='home'?won.home:won.choice==='away'?won.away:'平局')+'</span></span><span class="bet-tag bet-tag-won">赢得 '+won.potential+'金币</span></div>';if(lost)return'<div class="my-bet"><span>竞猜: <span class="my-bet-choice">'+(lost.choice==='home'?lost.home:lost.choice==='away'?lost.away:'平局')+'</span></span><span class="bet-tag bet-tag-lost">损失 '+lost.amount+'金币</span></div>';return''}
  // 检查比赛是否已到开赛时间
  var matchDT=new Date(m.date+'T'+m.time+':00+08:00');if(matchDT<=new Date())return'<div class="my-bet" style="color:#5a6580;text-align:center">比赛已开始，竞猜已关闭</div>'
  var p=predict(m.home,m.away),sel=selectedBet[m.id];
  var oh=calcOdds('home',p).toFixed(1),od=calcOdds('draw',p).toFixed(1),oa=calcOdds('away',p).toFixed(1);
  var h='<div class="bet-area"><div class="bet-buttons">';
  h+='<div class="bet-btn'+(sel==='home'?' selected':'')+'" onclick="selectBet('+m.id+',\'home\')">'+m.home+'胜<br><span style="font-size:9px;color:#4a9eff">'+oh+'</span></div>';

  h+='<div class="bet-btn'+(sel==='away'?' selected':'')+'" onclick="selectBet('+m.id+',\'away\')">'+m.away+'胜<br><span style="font-size:9px;color:#4a9eff">'+oa+'</span></div>';
  h+='</div>';
  if(sel){var amt=betAmounts[m.id]||100;var pot=Math.round(amt*calcOdds(sel,p));h+='<div class="bet-input"><label>下注:</label><input type="number" value="'+amt+'" min="10" max="'+(currentUser?currentUser.coins:1000)+'" onchange="setAmt('+m.id+',this.value)"> <span class="odds">可赢'+pot+'</span></div><button class="bet-confirm" onclick="confirmBet('+m.id+')">确认下注</button>'}
  h+='</div>';return h;
}

function addFriend(targetUid) {
  if (!currentUser) { showToast('', '请先登录', ''); return; }

  fetch(API + '/api/user/' + currentUser.uid + '/add-friend', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ targetUid: targetUid })
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) { showToast('', '添加失败', d.error); return; }
      showToast('🎉', '好友添加成功！', d.friend.avatar + ' ' + d.friend.nickname + ' 已成为你的好友');

function copyInvite() {

// ===== WebSocket 实时推送 =====
var ws = null;
var wsRetry = 0;
function connectWS() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host);

  ws.onopen = function() {
    console.log('📡 WebSocket 已连接');
    wsRetry = 0;
  };

  ws.onmessage = function(evt) {
    try {
      var msg = JSON.parse(evt.data);
      if (msg.type === 'snapshot') {
        allMatches = msg.matches;
        render();
      } else if (msg.type === 'match_update') {
        // 合并更新
        var changed = msg.matches || [];
        changed.forEach(function(cm) {
          var idx = allMatches.findIndex(function(m){return m.id===cm.id});
          if (idx >= 0) allMatches[idx] = cm;
          else allMatches.push(cm);
        });
        render();
        loadBets();
        // 提示用户
        changed.forEach(function(m) {
          if (m.status === 'finished') {
            showToast('⚽', '比赛结束', m.homeFlag + ' ' + m.home + ' ' + m.homeScore + '-' + m.awayScore + ' ' + m.away + ' ' + m.awayFlag);
          }
        });
      } else if (msg.type === 'bet_settled') {
        if (currentUser && msg.uid === currentUser.uid) {
          if (msg.won) {
            showToast('🎉', '竞猜猜对了!', '+' + msg.profit + ' 金币');
          } else {
            showToast('😅', '竞猜猜错了', msg.profit + ' 金币');
          }
          loadBets();
          // 刷新用户金币
          fetch(API + '/api/user/' + currentUser.uid).then(function(r){return r.json()}).then(function(d){
            if(d.user){currentUser=d.user;saveUser(currentUser);updateUserUI();}
          }).catch(function(){});
        }
      } else if (msg.type === 'pong') {
        // heartbeat ack
      }
    } catch(e) {}
  };

  ws.onclose = function() {
    console.log('📡 WebSocket 断开，重连中...');
    wsRetry++;
    setTimeout(connectWS, Math.min(30000, 1000 * Math.pow(2, wsRetry)));
  };

  ws.onerror = function() { ws.close(); };
}

// 心跳保活
setInterval(function() {
  if (ws && ws.readyState === 1) ws.send('{"type":"ping"}');
}, 30000);

connectWS();
